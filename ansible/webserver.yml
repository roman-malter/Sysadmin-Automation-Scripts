---
- name: Configure Linux Web Servers
  hosts: webservers
  become: true  # Runs tasks as root/sudo

  tasks:
    - name: Ensure the system cache is updated
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Apache web server
      apt:
        name: apache2
        state: present

    - name: Ensure Apache is started and enabled on boot
      service:
        name: apache2
        state: started
        enabled: yes
